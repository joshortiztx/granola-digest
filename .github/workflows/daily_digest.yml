name: Daily Meeting Digest

on:
  schedule:
    # 7:00 AM Central Time (12:00 UTC), weekdays only
    - cron: '0 12 * * 1-5'

  workflow_dispatch:

# Required: allow the workflow to commit digest files back to the repo
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run daily digest
        env:
          GRANOLA_API_KEY: ${{ secrets.GRANOLA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python daily_digest.py

      - name: Commit digest file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Add digest for $(date -u +%Y-%m-%d)"
          git push
